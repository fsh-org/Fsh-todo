<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Fsh ToDo</title>
    <!-- Boiler plate------ -->
    <link rel="icon" href="https://fsh.plus/fsh.png" type="image/png">
    <meta name="description" content="Fsh ToDo - Organize tasks online.">
    <!-- ------- -->
    <link rel="stylesheet" href="https://fsh.plus/media/style.css">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:image" content="https://fsh.plus/fsh.png"/>
    <meta name="theme-color" content="#a89c9b">
    <!-- ------------------ -->
    <script src="https://account.fsh.plus/script.js"></script>
    <link rel="stylesheet" href="./media/style.css">
    <link rel="manifest" href="./media/install.json">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.4/dist/confetti.browser.min.js"></script>
  </head>
  <body>
    <a href="https://fsh.plus">
      <table class="title">
        <tr>
          <td><video src="https://fsh.plus/fsh.webm" playsinline autoplay muted loop width="100" alt="Spining low quality fish"></video></td>
          <td><h1>Fsh</h1></td>
        </tr>
      </table>
    </a>
    <h2 style="margin-top:-20px">ToDo</h2>
    <dialog id="space_add">
      <button onclick="this.parentElement.close()" class="modal-close">x</button>
      <p id="space_add_text">Create a new space</p>
      <label>Name: <input placeholder="Space name" maxlength="25" id="space_add_name"></label>
      <div class="hsl-selector" id="hsl-selector">
        <div class="hsl-selector-indicator" id="hsl-selector-indicator"></div>
      </div>
      <button onclick="space_del()" id="space_del_button" style="display:none">Delete</button>
      <button onclick="space_act()" id="space_add_button">Create</button>
      <script src="./media/hsl-selector.js" defer></script>
    </dialog>
    <div class="creation">
      <input id="title" placeholder="Title">
      <textarea id="desc" placeholder="Description"></textarea>
      <select id="type">
        <option value="simple">Simple</option>
        <option value="md">Markdown</option>
      </select>
      <button onclick="task_add()" class="task-add">Add <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 256 256"><rect x="103" width="50" height="256" rx="25"></rect><rect y="103" width="256" height="50" rx="25"></rect></svg></button>
    </div>
    <div id="spaces"></div>
    <div id="toolbar"></div>
    <div id="tasks"></div>
    <div class="data-menu">
      <button onclick="file_exp()" aria-label="export data"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 256 256"><path d="M129 14.6569C129 11.0932 133.309 9.30857 135.828 11.8284L189.172 65.1716C191.691 67.6914 189.907 72 186.343 72H139C133.477 72 129 67.5228 129 62V14.6569Z"/><rect x="131.5" y="149.5" width="124.5" height="20" rx="10"/><rect x="210.64" y="110" width="70" height="20" rx="10" transform="rotate(45 210.64 110)"/><rect x="196.5" y="195" width="70" height="20" rx="10" transform="rotate(-45 196.5 195)"/><path d="M106.832 4.61035C113.459 4.61039 118.832 9.98296 118.832 16.6104V62.4785C118.832 73.1317 127.468 81.7684 138.121 81.7686H183.99C190.617 81.7688 195.99 87.1413 195.99 93.7686V139H141.5C130.178 139 121 148.178 121 159.5C121 170.822 130.178 180 141.5 180H195.99V232.227C195.99 242.88 187.353 251.516 176.7 251.516H24.9557C14.3027 251.515 5.6668 242.88 5.66663 232.227V23.8994C5.66685 13.2465 14.3027 4.61058 24.9557 4.61035H106.832Z"/></svg></button>
      <button onclick="file_imp()" aria-label="import data"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 256 256"><path d="M129 14.6569C129 11.0932 133.309 9.30857 135.828 11.8284L189.172 65.1716C191.691 67.6914 189.907 72 186.343 72H139C133.477 72 129 67.5228 129 62V14.6569Z"/><path fill-rule="evenodd" clip-rule="evenodd" d="M181.571 117.071C177.666 113.166 171.334 113.166 167.429 117.071L132.196 152.304C130.312 154.122 129.14 156.674 129.14 159.5C129.14 159.584 129.141 159.668 129.143 159.751C129.17 162.275 130.146 164.79 132.071 166.716L167.426 202.071C171.332 205.976 177.663 205.976 181.569 202.071C185.474 198.166 185.474 191.834 181.569 187.929L163.14 169.5H243.64C249.162 169.5 253.64 165.023 253.64 159.5C253.64 153.977 249.162 149.5 243.64 149.5H163.284L181.571 131.213C185.476 127.308 185.476 120.976 181.571 117.071Z"/><path d="M106.832 4.61035C113.459 4.61039 118.832 9.98296 118.832 16.6104V62.4785C118.832 73.1317 127.467 81.7684 138.121 81.7686H183.99C190.617 81.7688 195.99 87.1413 195.99 93.7686V142H181.731L188.133 135.577C195.216 128.472 195.217 116.951 188.134 109.846C181.052 102.74 169.568 102.74 162.485 109.846L125.825 146.626C118.742 153.732 118.742 165.252 125.825 172.357C126.381 172.915 126.965 173.429 127.571 173.899L161.778 208.218C168.814 215.277 180.224 215.277 187.26 208.218C194.296 201.158 194.297 189.713 187.26 182.653L181.625 177H195.99V232.227C195.99 242.88 187.353 251.516 176.7 251.516H24.9556C14.3026 251.515 5.66668 242.88 5.6665 232.227V23.8994C5.66673 13.2465 14.3026 4.61058 24.9556 4.61035H106.832Z"/></svg></button>
      <input type="file" id="file_upload" style="display:none" accept=".ftodo,.json">
    </div>
    <script src="./media/mdparse.js"></script>
    <script src="./media/script.js"></script>
  </body>
</html>
